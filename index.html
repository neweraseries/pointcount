        map1Pick: "แมตช์ 1: แผนที่ที่กำหนด", kingMapPick: "แมตช์ {0}: KING MAP ของ {1}", normalPick: "แมตช์ {0}: สิทธิ์การเลือกของ {1}", 
        broadcastBtn: "มุมมองถ่ายทอดสด", pick: "เลือก", closeBtn: "ปิด / Close",
        recordBtn: "สถิติ", recordTitle: "🏆 หอเกียรติยศสถิติแผนที่", backupBtn: "📥 สำรองข้อมูล", restoreBtn: "📤 คืนค่าข้อมูล", 
        recordHolder: "สถิติ:", noRecord: "ยังไม่มีสถิติ", newRecordAlert: "🎉 สถิติใหม่: {0} ทำลายสถิติ {1} ด้วยเวลา {2}!",
        preMatchTitleIndiv: "เดี่ยวสปรินต์คลาสสิก", preMatchTitleTeam: "ทีมสปรินต์คลาสสิก", preMatchTitle1v1: "1 VS 1 สปรินต์คลาสสิก", preMatchMode: "โหมด", preMatchBestRecord: "สถิติที่ดีที่สุด",
        scoreboardTab: "กระดานคะแนน", prematchTab: "ก่อนการแข่งขัน", matchResult: "ผลการแข่งขัน", selectCar: "เลือกรถ", selectPet: "เลือกสัตว์เลี้ยง",

        banMap: "แบนแผนที่", banned: "ถูกแบน"
      }
    };

    const getMapName = (id, lang) => {
      const mapLang = lang === 'th' ? 'en' : lang;
      for (const group of MAP_POOL) {
        const found = group.maps.find(m => m.id === id);
        if (found) return found[mapLang];
      }
      return '';
    };

    const getMapStars = (id) => {
      for (const group of MAP_POOL) {
        const found = group.maps.find(m => m.id === id);
        if (found) return group.stars;
      }
      return 0;
    };

    const parseTime = (val) => {
      if (!val || val.toUpperCase() === 'X') return null;
      if (val.includes(':') || val.includes('.')) {
        let m = 0, s = 0, c = 0;
        const parts = val.replace(',', '.').split(/[:.]/);
        if (parts.length === 3) [m, s, c] = parts.map(Number);
        else if (parts.length === 2) [s, c] = parts.map(Number);
        else return null;
        if (isNaN(m) || isNaN(s) || isNaN(c)) return null;
        return (m * 60000) + (s * 1000) + (c * 10);
      }
      const digits = val.replace(/\D/g, '');
      if (!digits) return null;
      let m = 0, s = 0, c = 0;
      if (digits.length >= 5) {
        c = Number(digits.slice(-2)); s = Number(digits.slice(-4, -2)); m = Number(digits.slice(0, -4));
      } else if (digits.length >= 3) {
        c = Number(digits.slice(-2)); s = Number(digits.slice(0, -2));
      } else {
        c = Number(digits);
      }
      return (m * 60000) + (s * 1000) + (c * 10);
    };

    const formatTimeDisplay = (val) => {
      if (!val) return '';
      if (val.toUpperCase() === 'X') return 'X';
      const ms = parseTime(val);
      if (ms === null) return val; 
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const c = Math.floor((ms % 1000) / 10);
      return `${m}:${s.toString().padStart(2, '0')}.${c.toString().padStart(2, '0')}`;
    };

    const getMapGradient = (mapId) => {
      if (!mapId) return '';
      let hash = 0;
      for (let i = 0; i < mapId.length; i++) hash = mapId.charCodeAt(i) + ((hash << 5) - hash);
      const h1 = Math.abs(hash % 360);
      const h2 = (h1 + 40) % 360;
      return `linear-gradient(135deg, hsl(${h1}, 40%, 30%), hsl(${h2}, 50%, 20%))`;
    };

    const getMapBackgroundStyle = (mapId) => {
      if (!mapId) return {};
      if (MAP_BACKGROUNDS[mapId]) {
        return {
          backgroundImage: `url(${MAP_BACKGROUNDS[mapId]})`,
          backgroundSize: 'cover',
          backgroundPosition: 'center'
        };
      }
      return { background: getMapGradient(mapId) };
    };

    // UPDATE: Thêm logic Ban Map vào SearchableMapSelect

      const [isOpen, setIsOpen] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const wrapperRef = useRef(null);

      useEffect(() => {
        function handleClickOutside(event) {
          if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
            setIsOpen(false);
            setSearchTerm('');
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const currentName = currentMapId ? getMapName(currentMapId, lang) : '';

      return (
        <div ref={wrapperRef} className={`relative w-full ${isOpen ? 'z-[100]' : 'z-20'}`}>
          <div 
            onClick={() => setIsOpen(!isOpen)}
            className={`w-full flex items-center justify-between bg-slate-950/80 border ${isOpen ? (isBan ? 'border-red-500 ring-1 ring-red-500' : 'border-cyan-500 ring-1 ring-cyan-500') : (isBan ? 'border-red-900/50 hover:border-red-700' : 'border-slate-700 hover:border-slate-500')} rounded px-2 py-1.5 cursor-pointer transition-all ${isBan ? 'bg-red-950/20' : ''}`}
          >
            <span className={`text-[10px] md:text-xs font-bold truncate ${currentName ? (isBan ? 'text-red-400' : 'text-cyan-300') : 'text-slate-500'}`}>
              {currentName || (isBan ? t.banMap : t.selectMap)}
            </span>
            <ChevronDown size={14} className={`${isBan ? 'text-red-900' : 'text-slate-400'} transition-transform ${isOpen ? 'rotate-180' : ''}`} />
          </div>

          {isOpen && (
            <div className="absolute top-full left-0 mt-1 w-[200px] md:w-full min-w-[160px] bg-slate-900 border border-slate-700 rounded-md shadow-2xl max-h-60 overflow-y-auto z-[100]">
              <div className="sticky top-0 bg-slate-900 p-2 border-b border-slate-700">
                <input 
                  type="text"
                  autoFocus
                  placeholder={t.searchPh}
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs text-white outline-none focus:border-red-500"
                />
              </div>
              <div className="p-1">
                <div 
                  className="px-2 py-1.5 text-xs text-slate-400 hover:bg-slate-800 rounded cursor-pointer mb-1"
                  onClick={() => { onChange(''); setIsOpen(false); setSearchTerm(''); }}
                >
                  -- {isBan ? t.banMap : t.selectMap} --
                </div>
                {MAP_POOL.map(group => {
                  const mapLang = lang === 'th' ? 'en' : lang;
                  const filteredMaps = group.maps.filter(m => m[mapLang].toLowerCase().includes(searchTerm.toLowerCase()));
                  if (filteredMaps.length === 0) return null;
                  
                  return (
                    <div key={group.stars} className="mb-2">
                      <div className="px-2 py-1 text-[10px] font-black text-red-500 uppercase bg-slate-950/50">
                        {`★`.repeat(group.stars)} {group.stars} {lang==='vi'?'Sao':lang==='en'?'Stars':'星'}
                      </div>
                      {filteredMaps.map(m => {
                        const isSelectedByOther = selectedMaps.includes(m.id) && m.id !== currentMapId;
                        const isBannedByOther = bannedMaps.includes(m.id) && m.id !== currentMapId;
                        const notAllowed = isSelectedByOther || isBannedByOther;
                        
                        return (
                          <div 
                            key={m.id}
                            onClick={() => {
                              if (!notAllowed) { onChange(m.id); setIsOpen(false); setSearchTerm(''); }
                            }}
                            className={`px-2 py-1.5 text-xs rounded transition-colors flex items-center justify-between ${
                              isBannedByOther ? 'text-red-500/50 cursor-not-allowed line-through' :
                              isSelectedByOther ? 'text-slate-600 cursor-not-allowed line-through' :
                              m.id === currentMapId ? (isBan ? 'bg-red-900/40 text-red-400 font-bold' : 'bg-cyan-900/40 text-cyan-400 font-bold') :
                              'text-slate-300 hover:bg-slate-800 cursor-pointer'
                            }`}
                          >
                            <span className="truncate">{m[mapLang]}</span>
                            {isBannedByOther && <span className="text-[9px] text-red-500 ml-1 border border-red-500/50 rounded px-1 flex-shrink-0">{t.banned}</span>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    const AutoFitText = ({ text }) => {
      const containerRef = useRef(null);
      const textRef = useRef(null);

      useEffect(() => {
        const resize = () => {
          window.requestAnimationFrame(() => {
            if (containerRef.current && textRef.current) {
              textRef.current.style.transform = 'none';
              const containerWidth = containerRef.current.clientWidth;
              const textWidth = textRef.current.scrollWidth;
              if (textWidth > containerWidth && containerWidth > 0) {
                const scale = (containerWidth / textWidth) * 0.95; 
                textRef.current.style.transform = `scale(${scale})`;
              }
            }
          });
        };
        resize();
        const observer = new ResizeObserver(resize);
        if (containerRef.current) observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, [text]);

      return (
        <div ref={containerRef} className="w-full flex justify-center items-end overflow-visible">
          <span 
            ref={textRef} 
            className="text-[9px] md:text-[11px] font-black text-cyan-300 uppercase tracking-widest drop-shadow-[0_2px_4px_rgba(0,0,0,1)] origin-bottom whitespace-nowrap transition-transform duration-200"
          >
            {text}
          </span>
        </div>
      );
    };

    const CustomDialog = ({ dialog, setDialog }) => {

              <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-4 ${dialog.type === 'confirm' ? 'bg-amber-500/20 text-amber-500' : 'bg-red-500/20 text-red-500'}`}>

           </div>

    };

    const BroadcastOverlay = ({ broadcastState, setBroadcastState, viewSet, setViewSet, soloSetBO, soloMatchBO, players, games, totals, getGameCalculations, matchStatus1v1, mapRecords, personalRecords, lang, t, gameMode, tournamentName, team1Name, team2Name, onAssetSelect, onClose, carDatabase, petDatabase, playerPhotos }) => {

              broadcastIndices.push(-1);

      const halfLen = Math.floor(players.length / 2);

      let headerTitle = gameMode === 'solo' ? t.preMatchTitleIndiv : gameMode === '1v1' ? t.preMatchTitle1v1 : t.preMatchTitleTeam;

          <div className="absolute -right-[10%] -bottom-[10%] w-[40%] h-[40%] bg-blue-600 blur-[150px] opacity-30 rounded-full pointer-events-none z-0 animate-[pulse_5s_ease-in-out_infinite]"></div>
          
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[10vw] font-black italic text-slate-300 opacity-[0.2] whitespace-nowrap pointer-events-none select-none z-0 tracking-tighter">

                  onClick={() => setBroadcastState({ ...broadcastState, tab: 'prematch' })} 
                  className={`px-4 md:px-8 py-2 md:py-2.5 font-black italic tracking-widest clip-slant transition-colors text-[10px] md:text-sm uppercase ${broadcastState.tab === 'prematch' ? 'bg-[#13c0eb] text-[#050510]' : 'bg-[#1e293b] text-slate-400 hover:bg-slate-700 hover:text-white'}`}

                        <div key={`header_${i}`} className="flex-1 min-w-[140px] md:min-w-[160px] py-3 md:py-4 text-center border-r border-white/20 last:border-r-0 relative overflow-hidden">

                                }

                                return (
                                  <div key={`g${gIndex}_p${pIndex}`} className={`w-full flex flex-col items-center justify-center relative flex-1 min-h-0 mx-1 group/item hover:bg-white/10 transition-colors rounded ${isTeamMode && pIndex === halfLen ? 'border-t-[2px] border-white/20 mt-1.5 pt-1 md:mt-2 md:pt-1.5' : ''}`}>
                                     
                                     <div className="relative flex flex-col items-center w-full pt-3 md:pt-4">
                                       {c.isKingMap && isTop && (
                                         <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full flex justify-center z-20">
                                           <Crown size={crownSize} className="text-[#fce300] animate-bounce drop-shadow-[0_0_8px_rgba(252,227,0,1)]"/>
                                         </div>
                                       )}
                                       <span className={`${nameSize} font-bold truncate w-[90%] text-center leading-tight ${textColor} drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-10`}>
                                         {playerName}
                                       </span>
                                     </div>

                                     {time ? (
                                        <div className="flex flex-col items-center justify-center mt-0.5 z-10">
                                           <span className={`${scoreSize} font-black leading-none ${isTop ? 'text-[#fce300] drop-shadow-[0_0_8px_rgba(252,227,0,0.8)]' : (gameMode === '1v1' ? 'text-slate-400 drop-shadow-md' : 'text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]')}`}>
                                             {gameMode === '1v1' 
                                                ? (isTop ? (lang === 'vi' ? 'THẮNG' : 'WIN') : (lang === 'vi' ? 'THUA' : 'LOSE')) 
                                                : `+${c.score}`}
                                           </span>
                                           {(gameMode === 'solo' || gameMode === '1v1') && (
                                               <span className={`${is6P ? 'text-[8px] md:text-[9px]' : 'text-[9px] md:text-[11px]'} font-mono font-bold ${isTop ? 'text-cyan-200' : 'text-slate-400'} mt-1 opacity-90 drop-shadow-md leading-none`}>{time}</span>
                                           )}
                                        </div>
                                     ) : (
                                        <div className="flex flex-col items-center justify-center mt-0.5 z-10">
                                           <span className={`${scoreSize} font-black leading-none text-slate-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]`}>-</span>
                                           {(gameMode === 'solo' || gameMode === '1v1') && (
                                               <span className={`${is6P ? 'text-[8px] md:text-[9px]' : 'text-[9px] md:text-[11px]'} font-mono font-bold text-transparent mt-1 leading-none`}>-</span>
                                           )}
                                        </div>
                                     )}
                                  </div>
                                );
                              })}
                            </div>

                            <div className="relative z-10 h-8 md:h-10 shrink-0 bg-gradient-to-t from-[#0f172a] via-[#0f172a]/80 to-transparent flex items-end justify-center pb-2 px-2 border-t border-white/5">
                              <AutoFitText text={mapName} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <div className="flex bg-[#0f172a]/80 backdrop-blur-xl border-t border-slate-700/50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] h-16 md:h-20 w-full shrink-0 relative z-20">
                  {gameMode === '1v1' && matchStatus1v1 ? (
                    <div className="flex w-full h-full bg-[#0ea5e9] items-center justify-between px-2 md:px-8 text-white font-black shadow-[inset_0_5px_20px_rgba(2,132,199,0.8)]">
                        <div className="flex items-center justify-start gap-4 flex-1 h-full pl-4 md:pl-8">
                            <span className="text-3xl md:text-4xl text-[#fce300] font-black drop-shadow-[0_0_10px_rgba(252,227,0,0.6)]">{matchStatus1v1.p1Sets}</span>
                            <div className="w-px h-8 bg-white/40 shadow-[1px_0_0_rgba(0,0,0,0.2)]"></div>
                            <span className="text-lg md:text-2xl tracking-wider truncate font-black drop-shadow-md text-center flex-1">{players[0]}</span>
                            <div className="w-px h-8 bg-white/40 shadow-[1px_0_0_rgba(0,0,0,0.2)]"></div>
                            <span className="text-2xl md:text-4xl text-white font-black drop-shadow-md min-w-[30px] text-center">{matchStatus1v1.p1Rounds}</span>
                        </div>
                        
                        <div className="flex-shrink-0 px-8 md:px-16 h-full bg-gradient-to-b from-white/90 to-white/70 skew-x-[-15deg] mx-4 flex items-center justify-center border-x border-white/50 shadow-2xl z-10">
                            <span className="block skew-x-[15deg] text-2xl md:text-3xl text-[#0ea5e9] font-black italic drop-shadow-sm">VS</span>
                        </div>

                        <div className="flex items-center justify-end gap-4 flex-1 h-full pr-4 md:pr-8">
                            <span className="text-2xl md:text-4xl text-white font-black drop-shadow-md min-w-[30px] text-center">{matchStatus1v1.p2Rounds}</span>
                            <div className="w-px h-8 bg-white/40 shadow-[1px_0_0_rgba(0,0,0,0.2)]"></div>
                            <span className="text-lg md:text-2xl tracking-wider truncate font-black drop-shadow-md text-center flex-1">{players[1]}</span>
                            <div className="w-px h-8 bg-white/40 shadow-[1px_0_0_rgba(0,0,0,0.2)]"></div>
                            <span className="text-3xl md:text-4xl text-[#fce300] font-black drop-shadow-[0_0_10px_rgba(252,227,0,0.6)]">{matchStatus1v1.p2Sets}</span>
                        </div>
                    </div>
                  ) : isTeamMode ? (
                     <div className="flex w-full h-full relative">
                       <div className="flex-1 flex flex-col items-center justify-center bg-gradient-to-r from-blue-900/50 to-blue-800/30 backdrop-blur-md relative overflow-hidden">
                          <div className="absolute right-0 top-0 bottom-0 w-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div>
                          <span className="text-blue-200 font-black text-sm md:text-base uppercase tracking-widest drop-shadow-md z-10">{team1Name}</span>
                          <span className="text-white font-black text-3xl md:text-5xl mt-0.5 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)] leading-none z-10">
                             {totals.filter((_, i) => i < halfLen).reduce((a, b) => a + b, 0)}
                          </span>
                       </div>
                       <div className="flex-1 flex flex-col items-center justify-center bg-gradient-to-l from-red-900/50 to-red-800/30 backdrop-blur-md relative overflow-hidden">
                          <div className="absolute left-0 top-0 bottom-0 w-1 bg-red-500 shadow-[0_0_15px_#ef4444]"></div>
                          <span className="text-red-200 font-black text-sm md:text-base uppercase tracking-widest drop-shadow-md z-10">{team2Name}</span>
                          <span className="text-white font-black text-3xl md:text-5xl mt-0.5 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)] leading-none z-10">
                             {totals.filter((_, i) => i >= halfLen).reduce((a, b) => a + b, 0)}
                          </span>
                       </div>
                     </div>
                  ) : (
                     players.map((p, i) => (
                      <div key={`foot_p_${i}`} className="flex-1 flex flex-col items-center justify-center border-r border-slate-700/50 bg-slate-900/40 backdrop-blur-md last:border-r-0 overflow-hidden px-2 relative group hover:bg-slate-800/80 transition-colors">
                        <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-cyan-500 to-blue-500 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                        <span className="text-cyan-200 font-bold text-sm md:text-base truncate max-w-full tracking-wide drop-shadow-md z-10">{p}</span>
                        <span className="text-white font-black text-3xl md:text-5xl mt-0.5 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] leading-none z-10">{totals[i]}</span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {/* TAB 2: GIAO DIỆN PRE-MATCH TÍCH HỢP CHỌN XE/PET */}
          {broadcastState.tab === 'prematch' && (
            <div className="flex-1 w-full max-w-[1920px] mx-auto p-4 md:p-8 flex flex-col z-10 relative animate-slide-up">
              
              <div className="w-full flex justify-between items-end mb-4 md:mb-6">
                <h2 className="text-2xl md:text-4xl font-black italic text-[#13c0eb] tracking-widest drop-shadow-[0_0_10px_rgba(19,192,235,0.5)] whitespace-normal break-words max-w-[70%] leading-tight">
                  {headerTitle}
                </h2>
                
                <select 
                  value={broadcastState.gameIndex} 
                  onChange={e => setBroadcastState({...broadcastState, gameIndex: Number(e.target.value)})} 
                  className="bg-[#0f172a]/80 backdrop-blur-md text-cyan-300 font-bold px-4 py-2 rounded-lg outline-none border border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.3)] cursor-pointer text-sm"
                >
                   {games.map((g, i) => {
                      let titleStr = `ROUND ${i+1}`;
                      if (gameMode === '1v1' && matchStatus1v1?.gameAssignments[i]) {
                         titleStr = `SET ${matchStatus1v1.gameAssignments[i].set} - G${matchStatus1v1.gameAssignments[i].round}`;
                      }
                      return <option key={g.id} value={i} className="bg-slate-900">{titleStr} - {g.mapId ? getMapName(g.mapId, lang) : 'UNKNOWN MAP'}</option>
                   })}
                </select>
              </div>

              <div className="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
                 <div className="w-full md:w-[40%] flex flex-col rounded-2xl overflow-hidden shadow-[0_15px_40px_rgba(0,0,0,0.5)] border border-cyan-500/40 bg-[#0f172a]/80 backdrop-blur-xl">
                    <div className="p-5 md:p-6 border-b border-white/10 flex justify-between items-center bg-gradient-to-r from-[#0ea5e9]/20 to-transparent shrink-0">
                        <div className="flex flex-col max-w-[70%]">
                            <span className="font-black italic text-lg md:text-xl lg:text-2xl xl:text-3xl text-cyan-300 uppercase tracking-wider drop-shadow-md break-words leading-tight">
                               {gameMode === '1v1' ? `${setRoundText} | ${mapName}` : mapName}
                            </span>
                            <div className="flex text-yellow-400 text-sm md:text-base mt-1 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]">
                               {Array(mapStars).fill(0).map((_, i) => <span key={i}>★</span>)}
                            </div>
                        </div>
                        <div className="flex flex-col items-end">
                            <span className="text-[10px] md:text-xs font-bold opacity-80 uppercase tracking-widest text-cyan-500">{t.preMatchMode}</span>
                            <span className="font-black italic text-lg md:text-xl text-white">{modeText}</span>
                        </div>
                    </div>
                    <div className="flex-1 relative p-4 md:p-5">
                        <div className="w-full h-full rounded-xl overflow-hidden border border-white/10 shadow-inner relative" style={bgStyle}>
                           <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                           <div className="absolute inset-0 border-2 border-cyan-500/20 mix-blend-overlay pointer-events-none"></div>
                           <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-50"></div>
                        </div>
                    </div>
                 </div>
                 
                 <div className={`w-full md:w-[60%] grid gap-4 lg:gap-6 ${players.length > 4 ? 'grid-cols-3' : 'grid-cols-2'} h-full max-h-full`}>
                    {players.map((playerName, pIdx) => {
                       const isTeam2 = isTeamMode && pIdx >= Math.floor(players.length / 2);
                       const cardGradient = isTeam2 ? 'from-red-900/60 to-red-800/40 border-red-500/40' : 'from-blue-900/60 to-blue-800/40 border-blue-500/40';
                       const textAccent = isTeam2 ? 'text-red-300' : 'text-cyan-300';
                       
                       const pbKey = `${playerName}_${activeGame.mapId}`;
                       const pbData = personalRecords[pbKey];
                       const displayRecord = pbData ? pbData.timeStr : '--:--.--';

                       const photoUrl = playerPhotos[pIdx] || '';
                       const carId = activeGame.cars?.[pIdx] || '';
                       const petId = activeGame.pets?.[pIdx] || '';
                       const carObj = carDatabase.find(c => c.id === carId);
                       const petObj = petDatabase.find(p => p.id === petId);

                       return (
                         <div key={pIdx} className={`relative flex flex-col rounded-2xl overflow-hidden shadow-2xl border backdrop-blur-md bg-gradient-to-br ${cardGradient} transition-transform hover:-translate-y-1 duration-300`}>
                            <div className="absolute inset-0 bg-gradient-to-tr from-white/5 to-transparent opacity-50"></div>
                            
                            <div className="absolute bottom-0 left-0 w-[60%] h-[95%] flex items-end justify-center pointer-events-none z-10">
                               {photoUrl ? (
                                   <img src={photoUrl} className="max-w-full max-h-full object-contain object-bottom drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)]" alt={playerName} onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/200x300/transparent/white?text=?'; }} />
                               ) : (
                                   <div className="flex items-center justify-center opacity-20 mb-8"><User size={100} /></div>
                               )}
                            </div>

                            <div className="absolute top-5 right-5 z-20 flex flex-col items-end text-right max-w-full pl-[40%]">
                               <span className="text-lg md:text-xl lg:text-2xl font-black italic text-white drop-shadow-md truncate w-full">{playerName}</span>
                               <span className={`text-[8px] md:text-[10px] font-bold tracking-widest uppercase mt-1 opacity-90 ${textAccent}`}>{t.preMatchBestRecord}</span>
                               <div className="text-3xl md:text-4xl lg:text-5xl font-black font-['Chakra_Petch'] text-white drop-shadow-[0_4px_8px_rgba(0,0,0,0.6)] mt-[-4px]">
                                  {displayRecord}
                               </div>
                            </div>

                            <div className="relative z-30 p-3 md:p-4 flex flex-col items-end justify-end mt-auto bg-gradient-to-t from-black/80 to-transparent pt-12">
                               <div className="flex gap-2 items-center">
                                  <div className="flex flex-col items-end cursor-pointer group" onClick={() => setAssetModal({ type: 'car', pIndex: pIdx })}>
                                     <div className="w-20 h-10 md:w-28 md:h-14 flex items-center justify-center relative transition-transform group-hover:scale-110">
                                        {carObj ? <img src={carObj.img} className="max-w-full max-h-full object-contain drop-shadow-[0_5px_10px_rgba(0,0,0,0.8)] scale-150" alt="Car" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/100x50/333/white?text=CAR'; }} /> : <div className="px-2 py-1 rounded bg-black/30 text-[8px] md:text-[10px] text-white/50 font-bold italic">{t.selectCar}</div>}
                                     </div>
                                     <span className={`text-[6px] md:text-[8px] uppercase mt-1 opacity-70 font-bold ${textAccent}`}>{carObj ? carObj.name : ''}</span>
                                  </div>
                                  <div className="flex flex-col items-end cursor-pointer group" onClick={() => setAssetModal({ type: 'pet', pIndex: pIdx })}>
                                     <div className="w-20 h-10 md:w-28 md:h-14 flex items-center justify-center relative transition-transform group-hover:scale-110">
                                        {petObj ? <img src={petObj.img} className="max-w-full max-h-full object-contain drop-shadow-[0_5px_10px_rgba(0,0,0,0.8)] scale-150" alt="Pet" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/100x50/333/white?text=PET'; }} /> : <div className="px-2 py-1 rounded bg-black/30 text-[8px] md:text-[10px] text-white/50 font-bold italic">{t.selectPet}</div>}
                                     </div>
                                     <span className={`text-[6px] md:text-[8px] uppercase mt-1 opacity-70 font-bold text-right max-w-[80px] leading-tight truncate ${textAccent}`}>{petObj ? petObj.name : ''}</span>
                                  </div>
                               </div>
                            </div>
                         </div>
                       );
                    })}
                 </div>
              </div>
            </div>
          )}

          {assetModal && (
            <div className="absolute inset-0 z-[2000] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm animate-slide-up">
                <div className="bg-slate-900 border border-slate-700 rounded-xl max-w-2xl w-full shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col h-[70vh] overflow-hidden">
                    <div className="flex justify-between items-center p-4 bg-slate-950 border-b border-slate-800">
                        <h3 className="text-white font-black italic tracking-widest uppercase">{assetModal.type === 'car' ? t.selectCar : t.selectPet} - PLAYER {assetModal.pIndex + 1}</h3>
                        <button onClick={() => {setAssetModal(null); setAssetSearch('');}} className="text-slate-400 hover:text-red-500"><XIcon size={24}/></button>
                    </div>
                    <div className="p-3 bg-slate-950 border-b border-slate-800">
                        <input 
                            type="text" 
                            autoFocus
                            placeholder="Tìm kiếm / Search..." 
                            value={assetSearch} 
                            onChange={e => setAssetSearch(e.target.value)}
                            className="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white outline-none focus:border-cyan-500 transition-colors"
                        />
                    </div>
                    <div className="flex-1 overflow-y-auto hide-scrollbar p-4 grid grid-cols-2 sm:grid-cols-3 gap-4 bg-[#0f172a]">
                        <div 
                            onClick={() => {
                                onAssetSelect(broadcastState.gameIndex, assetModal.pIndex, assetModal.type, '');
                                setAssetModal(null); setAssetSearch('');
                            }}
                            className="bg-slate-800/50 border border-slate-700 border-dashed rounded-lg p-2 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-800 hover:border-red-500 transition-colors text-slate-500 hover:text-red-500"
                        >
                            <Trash2 size={24} className="mb-2" />
                            <span className="text-[10px] font-bold">Xóa / Clear</span>
                        </div>
                        {(assetModal.type === 'car' ? carDatabase : petDatabase)
                            .filter(item => item.name.toLowerCase().includes(assetSearch.toLowerCase()))
                            .map(item => (
                                <div 
                                    key={item.id} 
                                    onClick={() => {
                                        onAssetSelect(broadcastState.gameIndex, assetModal.pIndex, assetModal.type, item.id);
                                        setAssetModal(null); setAssetSearch('');
                                    }}
                                    className="bg-slate-800/80 border border-slate-700 rounded-lg p-3 flex flex-col items-center justify-between gap-3 cursor-pointer hover:bg-slate-700 hover:border-cyan-400 transition-all shadow-md group"
                                >
                                    <div className="w-full h-16 bg-black/40 rounded flex items-center justify-center p-1 shadow-inner overflow-hidden">
                                        <img src={item.img} className="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/100x50/333/white?text=?'; }} />
                                    </div>
                                    <span className="text-[10px] text-white font-bold text-center w-full truncate px-1">{item.name}</span>
                                </div>
                            ))
                        }
                    </div>
                </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem('zsm_lang_v11_final') || 'vi');
      const t = TRANSLATIONS[lang];
      const [showInfo, setShowInfo] = useState(false);
      const [showRecordsModal, setShowRecordsModal] = useState(false);
      const [showDbModal, setShowDbModal] = useState(false);
      const [recordSearch, setRecordSearch] = useState(''); 
      const [toastMsg, setToastMsg] = useState(null); 
      
      const [broadcastState, setBroadcastState] = useState({ isOpen: false, tab: 'scoreboard', gameIndex: 0 });
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });

      const showDialogAlert = (msg) => setDialog({ isOpen: true, type: 'alert', message: msg, onConfirm: null });
      const showDialogConfirm = (msg, onConfirmCallback) => setDialog({ isOpen: true, type: 'confirm', message: msg, onConfirm: onConfirmCallback });

      /* DYNAMIC ASSETS STATES */
      const [carDatabase, setCarDatabase] = useState(() => {
          const saved = localStorage.getItem('zsm_cars_db_v1');
          if (saved) { try { return JSON.parse(saved); } catch(e) {} }
          return [
              { id: 'c1', name: 'Dark Azure Dragon', img: 'https://i.ibb.co/3s6Vp6Z/car1.png' },
              { id: 'c2', name: 'Hallet', img: 'https://i.ibb.co/3s6Vp6Z/car1.png' },
              { id: 'c3', name: 'S-Chrono Envoy', img: 'https://i.ibb.co/3s6Vp6Z/car1.png' },
              { id: 'c4', name: 'L-Qing', img: 'https://i.ibb.co/3s6Vp6Z/car1.png' }
          ];
      });

      const [petDatabase, setPetDatabase] = useState(() => {
          const saved = localStorage.getItem('zsm_pets_db_v1');
          if (saved) { try { return JSON.parse(saved); } catch(e) {} }
          return [
              { id: 'p1', name: 'Hellfire Dragon', img: 'https://i.ibb.co/3s6Vp6Z/car1.png' }, 
              { id: 'p2', name: 'Angel Feather', img: 'https://i.ibb.co/3s6Vp6Z/car1.png' }
          ];
      });

      const [playerPhotos, setPlayerPhotos] = useState(() => {
          const saved = localStorage.getItem('zsm_player_photos_v1');
          if (saved) { try { return JSON.parse(saved); } catch(e) {} }
          return Array(6).fill(""); 
      });

      // BANNED MAPS STATE (Mới thêm)
      const [bannedMaps, setBannedMaps] = useState(() => {
          const saved = localStorage.getItem('zsm_banned_maps_1v1_v11');
          if (saved) { try { return JSON.parse(saved); } catch(e) {} }
          return {}; 
      });

      const [tournamentName, setTournamentName] = useState(() => localStorage.getItem('zsm_tour_name') || 'CUSTOM TOURNAMENT');
      const [team1Name, setTeam1Name] = useState(() => localStorage.getItem('zsm_team1_name') || '');
      const [team2Name, setTeam2Name] = useState(() => localStorage.getItem('zsm_team2_name') || '');

      const [gameMode, setGameMode] = useState(() => {
        return localStorage.getItem('zsm_game_mode_v11') || 'solo';
      });
      const isTeamMode = gameMode === '2v2' || gameMode === '3v3';

      const [soloMatchBO, setSoloMatchBO] = useState(() => Number(localStorage.getItem('zsm_solo_match_bo')) || 3);
      const [soloSetBO, setSoloSetBO] = useState(() => Number(localStorage.getItem('zsm_solo_set_bo')) || 7);

      const [players, setPlayers] = useState(() => {
        const saved = localStorage.getItem('zsm_players_v11_final');
        if (saved) { try { return JSON.parse(saved); } catch(e) {} }
        return [`${t.defPlayer} 1`, `${t.defPlayer} 2`, `${t.defPlayer} 3`, `${t.defPlayer} 4`];
      });

      const [games, setGames] = useState(() => {
        const saved = localStorage.getItem('zsm_games_v11_final');
        if (saved) { 
           try { 
             const parsed = JSON.parse(saved);
             return parsed.map(g => ({
                 ...g,
                 cars: g.cars || Array(6).fill(''),
                 pets: g.pets || Array(6).fill('')
             }));
           } catch(e) {} 
        }
        return Array(9).fill(null).map((_, i) => ({ 
          id: Date.now() + i, 
          mapId: "", 
          times: Array(6).fill(''),
          cars: Array(6).fill(''),

      // HÀM XỬ LÝ CẤM MAP (Mới thêm)

           const playerName = players[pIndex];
           const pbKey = `${playerName}_${mapId}`;

           setPersonalRecords(prev => {
              const currentPB = prev[pbKey];

           });

           setMapRecords(prev => {
              const currentRecord = prev[mapId];
              if (!currentRecord || timeMs < currentRecord.timeMs) {

                 let msg = t.newRecordAlert.replace('{0}', playerName).replace('{1}', mapName).replace('{2}', formattedTime);
                 if (currentRecord) {
                    msg += lang === 'vi' ? ` (Kỷ lục cũ: ${currentRecord.player} - ${currentRecord.timeStr})` : ` (Old: ${currentRecord.player} - ${currentRecord.timeStr})`;

                 setToastMsg(msg);
                 setTimeout(() => setToastMsg(null), 4000);

                 return {
                    ...prev,
                    [mapId]: { timeMs: timeMs, timeStr: formattedTime, player: playerName, date: new Date().toLocaleDateString() }
                 };
              }
              return prev;
           });
        }
      };

      const toggleMode = () => {
          let nextMode = 'solo';
          if (gameMode === 'solo') nextMode = '2v2';
          else if (gameMode === '2v2') nextMode = '3v3';
          else if (gameMode === '3v3') nextMode = '1v1';
          setGameMode(nextMode);

          if (nextMode === 'solo' || nextMode === '2v2') {
             let newP = [...players];
             if (newP.length < 4) {
                 while(newP.length < 4) newP.push(`${t.defPlayer} ${newP.length + 1}`);
             } else if (newP.length > 4) {
                 newP = newP.slice(0, 4); 
             }
             setPlayers(newP);
          } else if (nextMode === '3v3') {
