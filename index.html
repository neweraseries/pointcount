             let newP = [...players];
             if (newP.length > 2) newP = newP.slice(0, 2);
             while(newP.length < 2) newP.push(`${t.defPlayer} ${newP.length + 1}`);
             setPlayers(newP);
          }
      };

      const addPlayer = () => {
        if (gameMode === '1v1') return showDialogAlert(lang === 'vi' ? "Mode SOLO 1VS1 bắt buộc có 2 VĐV!" : "SOLO 1VS1 requires exactly 2 players!");
        if (players.length >= MAX_PLAYERS) return showDialogAlert(t.errMaxP);
        setPlayers([...players, `${t.defPlayer} ${players.length + 1}`]);
      };

      const removePlayer = (pIndex) => {
        if (gameMode === '1v1') return showDialogAlert(lang === 'vi' ? "Mode SOLO 1VS1 bắt buộc có 2 VĐV!" : "SOLO 1VS1 requires exactly 2 players!");
        if (players.length <= 2) return showDialogAlert(t.errMinP);
        showDialogConfirm(t.delP.replace('{0}', players[pIndex]), () => {
          setPlayers(players.filter((_, i) => i !== pIndex));
          setGames(games.map(g => ({ 
             ...g, 
             times: g.times.filter((_, i) => i !== pIndex),
             cars: g.cars ? g.cars.filter((_, i) => i !== pIndex) : Array(6).fill(''),
             pets: g.pets ? g.pets.filter((_, i) => i !== pIndex) : Array(6).fill('')
          })));
        });
      };

      const addGame = () => {
        if (gameMode === '1v1') return showDialogAlert(lang === 'vi' ? "Mode SOLO 1VS1 tự động sinh ván đấu theo thiết lập (BO)." : "1VS1 Mode auto-generates matches based on BO format.");
        if (games.length >= MAX_GAMES) return showDialogAlert(t.errMaxG);
        setGames([...games, { id: Date.now(), mapId: "", times: Array(6).fill(''), cars: Array(6).fill(''), pets: Array(6).fill('') }]);
      };

      const removeGame = (gIndex) => {
        if (gameMode === '1v1') return showDialogAlert(lang === 'vi' ? "Mode SOLO 1VS1 không được tự xóa trận." : "Cannot delete games in 1VS1 Mode.");
        if (games.length <= 1) return showDialogAlert(t.errMinG);
        showDialogConfirm(t.delG.replace('{0}', gIndex + 1), () => {
           setGames(games.filter((_, i) => i !== gIndex));
        });
      };

      const clearAll = () => {
        showDialogConfirm(t.confirmReset, () => {
          setPlayers(gameMode === '1v1' ? [`${t.defPlayer} 1`, `${t.defPlayer} 2`] : [`${t.defPlayer} 1`, `${t.defPlayer} 2`, `${t.defPlayer} 3`, `${t.defPlayer} 4`]);
          const numGames = gameMode === '1v1' ? (soloMatchBO * soloSetBO) : 9;
          setGames(Array(numGames).fill(null).map((_, i) => ({ id: Date.now() + i, mapId: "", times: Array(6).fill(''), cars: Array(6).fill(''), pets: Array(6).fill('') })));
          setTeam1Name('');
          setTeam2Name('');
          setBannedMaps({}); // Xoá luôn lịch sử ban map
        });
      };

      const matchStatus1v1 = useMemo(() => {
        if (gameMode !== '1v1') return null;
        let p1Sets = 0; let p2Sets = 0;
        let p1Rounds = 0; let p2Rounds = 0;
        let currentSet = 1;
        let gameAssignments = [];
        let mapsUsedSet12 = [];
        let mapsUsedSet3 = [];
        const winCond = Math.ceil(soloSetBO / 2);
        
        games.forEach((g, idx) => {
            const setNum = Math.floor(idx / soloSetBO) + 1;
            const roundNum = (idx % soloSetBO) + 1;
            
            gameAssignments.push({
                set: setNum,
                round: roundNum,
            });

            if (g.mapId) {
                if (setNum < 3) mapsUsedSet12.push(g.mapId);
                else mapsUsedSet3.push(g.mapId);
            }
        });

        for (let s = 1; s <= soloMatchBO; s++) {
            let s_p1Rounds = 0;
            let s_p2Rounds = 0;
            let setFinished = false;

            for (let r = 1; r <= soloSetBO; r++) {
                const gIdx = (s - 1) * soloSetBO + (r - 1);
                if (gIdx >= games.length) continue;
                const g = games[gIdx];
                
                const t1 = g.times[0]; const t2 = g.times[1];
                
                const isT1Final = t1 && (t1.includes(':') || t1.toUpperCase() === 'X');
                const isT2Final = t2 && (t2.includes(':') || t2.toUpperCase() === 'X');

                let winner = -1;
                
                if (isT1Final && isT2Final) {
                    const v1 = parseTime(t1); const v2 = parseTime(t2);
                    const p1DNF = t1.toUpperCase() === 'X';
                    const p2DNF = t2.toUpperCase() === 'X';

                    if (v1 !== null && v2 !== null) winner = v1 < v2 ? 0 : (v2 < v1 ? 1 : -1);
                    else if (v1 !== null || p2DNF) winner = 0;
                    else if (v2 !== null || p1DNF) winner = 1;
                }
                
                if (winner === 0) s_p1Rounds++;
                if (winner === 1) s_p2Rounds++;

                if (s_p1Rounds >= winCond) { p1Sets++; setFinished = true; break; }
                if (s_p2Rounds >= winCond) { p2Sets++; setFinished = true; break; }
            }

            if (!setFinished) {
                currentSet = s;
                p1Rounds = s_p1Rounds;
                p2Rounds = s_p2Rounds;
                break; 
            }
        }
        
        return { p1Sets, p2Sets, p1Rounds, p2Rounds, currentSet, gameAssignments, mapsUsedSet12, mapsUsedSet3 };
      }, [games, gameMode, soloMatchBO, soloSetBO]);

      useEffect(() => {
          if (gameMode === '1v1' && matchStatus1v1?.currentSet) {
              setViewSet(matchStatus1v1.currentSet);
          }
      }, [matchStatus1v1?.currentSet, gameMode]);

      const selectedMaps = useMemo(() => {
        if (gameMode === '1v1' && matchStatus1v1) {
            return []; 
        }
        return games.map(g => g.mapId).filter(id => id !== "");
      }, [games, gameMode, matchStatus1v1]);

      const backupRecords = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(mapRecords, null, 2));
        const anchor = document.createElement('a');
        anchor.href = dataStr;
        anchor.download = `MapRecords_Backup_${new Date().toISOString().slice(0,10)}.json`;
        anchor.click();
      };

      const restoreRecords = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const importedData = JSON.parse(e.target.result);
            if (typeof importedData === 'object' && importedData !== null) {
              setMapRecords(importedData);
              showDialogAlert('Phục hồi dữ liệu Kỷ Lục thành công! / Records restored successfully!');
            }
          } catch (error) { 
             showDialogAlert('File không hợp lệ! / Invalid file format!'); 
          }
        };
        reader.readAsText(file);
      };

      const handleDeleteRecord = (mapId) => {
        showDialogConfirm(lang === 'vi' 
            ? "Bạn có chắc muốn xóa kỷ lục map này?\n(Kỷ lục cá nhân của các VĐV ở map này cũng sẽ bị xóa sạch)" 
            : "Are you sure to delete this map record?\n(Personal records for this map will also be deleted)", 
        () => {
            setMapRecords(prev => {
                const newRecords = {...prev};
                delete newRecords[mapId];
                return newRecords;
            });
            setPersonalRecords(prev => {
                const newPRs = {...prev};
                Object.keys(newPRs).forEach(key => {
                   if (key.endsWith(`_${mapId}`)) {
                       delete newPRs[key];
                   }
                });
                return newPRs;
            });
        });
      };

      const exportProfessionalExcel = async () => {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Leaderboard');
        const halfLen = Math.floor(players.length / 2);
        const modeText = gameMode === 'solo' ? t.modeSolo : gameMode === '1v1' ? t.mode1v1 : gameMode === '2v2' ? t.mode2v2 : t.mode3v3;
        const lastColIndex = 1 + (players.length * 2);
        
        sheet.mergeCells(1, 1, 1, lastColIndex);
        const titleCell = sheet.getCell(1, 1);
        titleCell.value = t.title + ` - ${modeText}`;
        titleCell.font = { bold: true, size: 16, color: { argb: 'FFFFFFFF' } };
        titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E293B' } };
        titleCell.alignment = { horizontal: 'center', vertical: 'middle' };
        sheet.getRow(1).height = 40;

        sheet.getCell(2, 1).value = t.match;
        sheet.getCell(2, 1).font = { bold: true };
        
        players.forEach((p, i) => {
          const timeCol = 2 + (i * 2);
          const ptsCol = 3 + (i * 2);
          sheet.mergeCells(2, timeCol, 2, ptsCol);
          const pCell = sheet.getCell(2, timeCol);
          pCell.value = p;
          
          let headerColor = 'FFDDEBF7'; 
          if (isTeamMode) headerColor = (i < halfLen) ? 'FFBFDBFE' : 'FFFECACA'; 
          pCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: headerColor } }; 
          pCell.font = { bold: true };
          pCell.alignment = { horizontal: 'center' };

          sheet.getCell(3, timeCol).value = "Time";
          sheet.getCell(3, ptsCol).value = t.pts;
          sheet.getCell(3, ptsCol).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2EFDA' } }; 
        });

        sheet.getRow(2).alignment = { horizontal: 'center', vertical: 'middle' };
        sheet.getRow(3).alignment = { horizontal: 'center', vertical: 'middle' };
        sheet.getRow(2).height = 25;

        games.forEach((game, gIndex) => {
          const rowNum = 4 + gIndex;
          const mapName = game.mapId ? getMapName(game.mapId, lang) : '';
          
          let matchStr = `${t.defGame} ${gIndex + 1}`;
          if (gameMode === '1v1' && matchStatus1v1 && matchStatus1v1.gameAssignments[gIndex]) {
              matchStr = `S${matchStatus1v1.gameAssignments[gIndex].set} - G${matchStatus1v1.gameAssignments[gIndex].round}`;
          }
          sheet.getCell(rowNum, 1).value = `${matchStr}${mapName ? ` - ${mapName}` : ''}`;
          
          const calcs = getGameCalculations(gIndex, game.times);
          game.times.forEach((time, pIdx) => {
            if (pIdx >= players.length) return;
            const timeCol = 2 + (pIdx * 2);
            const ptsCol = 3 + (pIdx * 2);
            const score = calcs[pIdx].score;
            sheet.getCell(rowNum, timeCol).value = time || "-";
            sheet.getCell(rowNum, ptsCol).value = time ? score : 0;
            sheet.getCell(rowNum, timeCol).alignment = { horizontal: 'center' };
            sheet.getCell(rowNum, ptsCol).alignment = { horizontal: 'center' };

            if (calcs[pIdx].isBest) {
              const bgColor = calcs[pIdx].isKingMap ? 'FFFF6666' : 'FFFFFF99'; 
              const fontColor = calcs[pIdx].isKingMap ? 'FF9C0006' : 'FF000000'; 
              sheet.getCell(rowNum, timeCol).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgColor } };
              sheet.getCell(rowNum, ptsCol).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgColor } };
              sheet.getCell(rowNum, ptsCol).font = { bold: true, color: { argb: fontColor } };
            }
          });
        });

        const totalRow = 4 + games.length;
        const totalLabelCell = sheet.getCell(totalRow, 1);
        totalLabelCell.value = isTeamMode ? t.indivTotal : (gameMode === '1v1' ? t.roundScore : t.total);
        totalLabelCell.font = { bold: true, size: 12 };
        totalLabelCell.alignment = { horizontal: 'right' };

        totals.forEach((tot, pIdx) => {
          const timeCol = 2 + (pIdx * 2);
          const ptsCol = 3 + (pIdx * 2);
          sheet.mergeCells(totalRow, timeCol, totalRow, ptsCol);
          const tCell = sheet.getCell(totalRow, timeCol);
          tCell.value = tot;
          tCell.font = { bold: true, size: 12 };
          tCell.alignment = { horizontal: 'center' };
          tCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF2CC' } }; 
        });

        let lastRowIndex = totalRow;
        if (isTeamMode) {
          lastRowIndex = totalRow + 1;
          const team1Score = totals.filter((_, i) => i < halfLen).reduce((a, b) => a + b, 0);
          const team2Score = totals.filter((_, i) => i >= halfLen).reduce((a, b) => a + b, 0);
          
          sheet.mergeCells(lastRowIndex, 1, lastRowIndex, 1);
          const teamLabelCell = sheet.getCell(lastRowIndex, 1);
          teamLabelCell.value = t.teamTotal;
          teamLabelCell.font = { bold: true, size: 14, color: { argb: 'FFFFFFFF' } };
          teamLabelCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF334155' } }; 
          teamLabelCell.alignment = { horizontal: 'right', vertical: 'middle' };

          const totalCols = players.length * 2;
          const halfCols = Math.floor(totalCols / 2);
          
          sheet.mergeCells(lastRowIndex, 2, lastRowIndex, 1 + halfCols);
          const t1Cell = sheet.getCell(lastRowIndex, 2);
          t1Cell.value = `${displayTeam1Name}: ${team1Score}`;
          t1Cell.font = { bold: true, size: 16, color: { argb: 'FFFFFFFF' } };
          t1Cell.alignment = { horizontal: 'center', vertical: 'middle' };
          t1Cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1D4ED8' } }; 

          if (players.length > 1) {
            sheet.mergeCells(lastRowIndex, 2 + halfCols, lastRowIndex, 1 + totalCols);
            const t2Cell = sheet.getCell(lastRowIndex, 2 + halfCols);
            t2Cell.value = `${displayTeam2Name}: ${team2Score}`;
            t2Cell.font = { bold: true, size: 16, color: { argb: 'FFFFFFFF' } };
            t2Cell.alignment = { horizontal: 'center', vertical: 'middle' };
            t2Cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB91C1C' } }; 
          }
          sheet.getRow(lastRowIndex).height = 30;
        }

        sheet.getColumn(1).width = 30;
        players.forEach((_, i) => {
          sheet.getColumn(2 + (i * 2)).width = 12;
          sheet.getColumn(3 + (i * 2)).width = 8; 
        });

        sheet.eachRow((row, rowNumber) => {
          if (rowNumber > 1 && rowNumber <= lastRowIndex) {
            row.eachCell((cell) => {
              cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
            });
          }
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = window.URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = `Leaderboard_${new Date().getTime()}.xlsx`;
        anchor.click();
        window.URL.revokeObjectURL(url);
      };

      const getGameCalculations = (gameIndex, times) => {
        const parsed = times.map(parseTime);
        const valids = parsed.filter(t => t !== null);
        const bestTime = valids.length > 0 ? Math.min(...valids) : null;

        return parsed.map((timeMs, pIndex) => {
          if (gameMode === '1v1') {
             const isBest = timeMs === bestTime && timeMs !== null;
             return {
                 score: isBest ? 1 : 0,
                 isBest: isBest,
                 isKingMap: false,
                 colorClass: isBest ? 'text-amber-950 bg-amber-400 font-black shadow-[0_5px_15px_rgba(251,191,36,0.4)] border-amber-300' : 'text-slate-500 bg-slate-900/80 border-transparent'
             };
          }

          let kingMapGameIndex = pIndex + 1;
          if (gameMode !== 'solo') {
             const H = Math.floor(players.length / 2);
             if (pIndex < H) kingMapGameIndex = 1 + pIndex * 2; 
             else kingMapGameIndex = 2 + (pIndex - H) * 2; 
          }
          const isKingMap = (gameIndex === kingMapGameIndex); 
          if (timeMs === null) return { score: 0, isBest: false, isKingMap, colorClass: 'text-slate-600 bg-slate-900/50 border-transparent' };
          
          const isBest = (timeMs === bestTime);
          let score = 0, colorClass = 'text-cyan-400 bg-slate-800/80 border-transparent hover:border-slate-600';

          if (isBest) {
            score = isKingMap ? KING_TOP_SCORE : NORMAL_TOP_SCORE;
            colorClass = isKingMap 
              ? 'text-red-100 bg-red-600 font-black shadow-[0_5px_15px_rgba(220,38,38,0.4)] border-red-400' 
              : 'text-amber-950 bg-amber-400 font-black shadow-[0_5px_15px_rgba(251,191,36,0.4)] border-amber-300'; 
          } else {
            const diffSec = Math.floor((timeMs - bestTime) / 1000);
            score = Math.max(0, 10 - diffSec);
            if (score === 0) colorClass = 'text-slate-500 bg-slate-900/80 border-transparent'; 
          }
          return { score, isBest, isKingMap, colorClass };
        });
      };

      const totals = useMemo(() => {
        if (gameMode === '1v1' && matchStatus1v1) {
            return [matchStatus1v1.p1Rounds, matchStatus1v1.p2Rounds];
        }
        const sums = Array(players.length).fill(0);
        games.forEach((g, gIdx) => { 
           getGameCalculations(gIdx, g.times).forEach((c, pIdx) => {
              if (pIdx < players.length) sums[pIdx] += c.score;
           }); 
        });
        return sums;
      }, [games, players, gameMode, matchStatus1v1]);

      const activeLeaderboard = useMemo(() => {
        const halfLen = Math.floor(players.length / 2);
        if (isTeamMode) {
          const team1Score = totals.filter((_, i) => i < halfLen).reduce((a, b) => a + b, 0);
          const team2Score = totals.filter((_, i) => i >= halfLen).reduce((a, b) => a + b, 0);
          const teams = [
            { id: 'team1', name: displayTeam1Name, playersStr: players.filter((_, i) => i < halfLen).join(' & '), score: team1Score, isT1: true },
            { id: 'team2', name: displayTeam2Name, playersStr: players.filter((_, i) => i >= halfLen).join(' & '), score: team2Score, isT1: false }
          ];
          if (players.length < 2) teams.pop();
          const sorted = teams.sort((a, b) => b.score - a.score);
          let currentRank = 1;
          return sorted.map((item, index) => {
            if (index > 0 && item.score < sorted[index - 1].score) currentRank = index + 1; 
            return { ...item, rank: currentRank };
          });
        } else {
          const sorted = players.map((name, i) => ({ name, score: totals[i], id: `p_${i}`, oIndex: i })).sort((a, b) => b.score - a.score);
          let currentRank = 1;
          return sorted.map((item, index) => {
            if (index > 0 && item.score < sorted[index - 1].score) currentRank = index + 1; 
            return { ...item, rank: currentRank };
          });
        }
      }, [players, totals, isTeamMode, displayTeam1Name, displayTeam2Name]);

      const nextPickerData = useMemo(() => {
        const nextIdx = games.findIndex(g => {
            return g.times.slice(0, players.length).every(time => !time || time.trim() === '');
        });

        if (gameMode === '1v1') {
            let lastPlayedIdx = -1;
            for (let i = games.length - 1; i >= 0; i--) {
                const t1 = games[i].times[0]; const t2 = games[i].times[1];
                if ((t1 && t1.trim() !== '') || (t2 && t2.trim() !== '')) {
                    lastPlayedIdx = i;
                    break;
                }
            }

            if (lastPlayedIdx === -1) {
                return { show: true, text: t.map1Pick };
            }

            const winCond = Math.ceil(soloSetBO / 2);
            let s_p1Rounds = 0, s_p2Rounds = 0;
            let lastGameWinner = -1; 

            for (let s = 1; s <= soloMatchBO; s++) {
                s_p1Rounds = 0;
                s_p2Rounds = 0;

                for (let r = 1; r <= soloSetBO; r++) {
                    const gIdx = (s - 1) * soloSetBO + (r - 1);
                    if (gIdx > lastPlayedIdx) break; 

                    const g = games[gIdx];
                    const t1 = g.times[0]; const t2 = g.times[1];
                    const isT1Final = t1 && (t1.includes(':') || t1.toUpperCase() === 'X');
                    const isT2Final = t2 && (t2.includes(':') || t2.toUpperCase() === 'X');

                    let winner = -1;
                    if (isT1Final && isT2Final) {
                        const v1 = parseTime(t1); const v2 = parseTime(t2);
                        const p1DNF = t1.toUpperCase() === 'X';
                        const p2DNF = t2.toUpperCase() === 'X';

                        if (v1 !== null && v2 !== null) winner = v1 < v2 ? 0 : (v2 < v1 ? 1 : -1);
                        else if (v1 !== null || p2DNF) winner = 0;
                        else if (v2 !== null || p1DNF) winner = 1;
                    }
                    
                    if (winner === 0) s_p1Rounds++;
                    if (winner === 1) s_p2Rounds++;
                    
                    if (gIdx === lastPlayedIdx) {
                        lastGameWinner = winner; 
                    }

                    if (s_p1Rounds >= winCond || s_p2Rounds >= winCond) {
                        break; 
                    }
                }
                
                if (lastPlayedIdx < s * soloSetBO) {
                    break;
                }
            }

            let pickerIndex = 0;
            let isNewSet = (s_p1Rounds >= winCond || s_p2Rounds >= winCond);

            if (isNewSet) {
                pickerIndex = s_p1Rounds >= winCond ? 1 : 0;
            } else {
                if (s_p1Rounds < s_p2Rounds) {
                    pickerIndex = 0; 
                } else if (s_p2Rounds < s_p1Rounds) {
                    pickerIndex = 1; 
                } else {
                    if (lastGameWinner === 0) pickerIndex = 1; 
                    else if (lastGameWinner === 1) pickerIndex = 0; 
                    else {
                        const lastG = games[lastPlayedIdx];
                        const v1 = parseTime(lastG.times[0]); const v2 = parseTime(lastG.times[1]);
                        if (v1 !== null && v2 !== null) pickerIndex = v1 > v2 ? 0 : 1;
                        else pickerIndex = 0;
                    }
                }
            }

            const pickerName = players[pickerIndex];
            
            let nextAssign = matchStatus1v1?.gameAssignments[lastPlayedIdx + 1];
            if (isNewSet) {
                const currentSet = Math.floor(lastPlayedIdx / soloSetBO) + 1;
                nextAssign = { set: currentSet + 1, round: 1 };
            }
            
            let displayText = "";
            if (nextAssign) {
                displayText = lang === 'vi' 
                    ? `SET ${nextAssign.set} - GAME ${nextAssign.round}: LƯỢT CHỌN MAP CỦA ${pickerName}`
                    : `SET ${nextAssign.set} - GAME ${nextAssign.round}: ${pickerName}'S PICK`;
            } else {
                displayText = t.normalPick.replace('{0}', lastPlayedIdx + 2).replace('{1}', pickerName);
            }

            return { show: true, text: displayText, pIndex: pickerIndex };
        }

        if (nextIdx === -1) return { show: false }; 
        if (nextIdx === 0) return { show: true, text: t.map1Pick }; 

        const actualLastGameIndex = nextIdx - 1; 

        if (nextIdx >= 1 && nextIdx < players.length + 1) {
            let kingPlayerIndex = nextIdx - 1;
            if (isTeamMode) {
                const H = Math.floor(players.length / 2);
                if (nextIdx % 2 !== 0) kingPlayerIndex = Math.floor((nextIdx - 1) / 2);
                else kingPlayerIndex = H + Math.floor((nextIdx - 2) / 2);
            }
            const pickerName = players[kingPlayerIndex];
            return { show: true, text: t.kingMapPick.replace('{0}', nextIdx + 1).replace('{1}', pickerName), pIndex: kingPlayerIndex };
        }

        const halfLen = Math.floor(players.length / 2);
        
        if (isTeamMode) {
          const t1Score = totals.filter((_, i) => i < halfLen).reduce((a, b) => a + b, 0);
          const t2Score = totals.filter((_, i) => i >= halfLen).reduce((a, b) => a + b, 0);
          let isT1 = true;
          if (t1Score < t2Score) isT1 = true;
          else if (t2Score < t1Score) isT1 = false;
          else {
              const lastGameCalcs = getGameCalculations(actualLastGameIndex, games[actualLastGameIndex].times);
              const lastT1Score = lastGameCalcs.filter((_, i) => i < halfLen).reduce((a, b) => a + b.score, 0);
              const lastT2Score = lastGameCalcs.filter((_, i) => i >= halfLen).reduce((a, b) => a + b.score, 0);
              isT1 = lastT1Score <= lastT2Score;
          }
          const teamName = isT1 ? displayTeam1Name : displayTeam2Name;
          const colorClass = isT1 ? 'text-blue-400' : 'text-red-400';
          return { show: true, text: t.normalPick.replace('{0}', nextIdx + 1).replace('{1}', teamName), isT1, colorClass };
        } else {
          const lastGameTimes = games[actualLastGameIndex].times.map(parseTime);
          const pStats = players.map((_, i) => ({
              index: i, total: totals[i], lastTimeMs: lastGameTimes[i] === null ? Infinity : lastGameTimes[i] 
          }));
          pStats.sort((a, b) => b.total - a.total);
          if (pStats.length < 2) return { show: false };
          let targetPlayers = [];
          if (pStats[0].total === pStats[1].total) {
              const topScore = pStats[0].total; targetPlayers = pStats.filter(p => p.total === topScore);
          } else {
              const secondScore = pStats[1].total; targetPlayers = pStats.filter(p => p.total === secondScore);
          }
          targetPlayers.sort((a, b) => b.lastTimeMs - a.lastTimeMs);
          const pickerIndex = targetPlayers[0].index;
          const pickerName = players[pickerIndex];
          return { show: true, text: t.normalPick.replace('{0}', nextIdx + 1).replace('{1}', pickerName), pIndex: pickerIndex };
        }
      }, [games, totals, players, isTeamMode, gameMode, lang, t, displayTeam1Name, displayTeam2Name, soloMatchBO, soloSetBO, matchStatus1v1]);

      const DatabaseManagerModal = () => {
         const [activeTab, setActiveTab] = useState('players');
         const [newItemName, setNewItemName] = useState('');
         const [newItemUrl, setNewItemUrl] = useState('');

         const handleAddAsset = () => {
            if (!newItemName.trim() || !newItemUrl.trim()) return;
            const newAsset = { id: `${activeTab}_${Date.now()}`, name: newItemName, img: newItemUrl };
            if (activeTab === 'cars') setCarDatabase([...carDatabase, newAsset]);
            else if (activeTab === 'pets') setPetDatabase([...petDatabase, newAsset]);
            setNewItemName('');
            setNewItemUrl('');
         };

         const handleDeleteAsset = (id, type) => {
            showDialogConfirm(lang === 'vi' ? 'Bạn có chắc chắn muốn xóa dữ liệu này?' : 'Are you sure to delete this item?', () => {
               if (type === 'cars') setCarDatabase(carDatabase.filter(c => c.id !== id));
               else if (type === 'pets') setPetDatabase(petDatabase.filter(p => p.id !== id));
            });
         };

         return (
            <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-slide-up" onClick={() => setShowDbModal(false)}>
               <div className="bg-slate-900 border border-cyan-500/50 rounded-xl max-w-4xl w-full shadow-[0_0_50px_rgba(6,182,212,0.2)] overflow-hidden flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                  <div className="bg-slate-950 px-4 py-3 md:py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                     <h3 className="font-black text-cyan-400 italic tracking-widest uppercase text-lg flex items-center gap-2"><DatabaseIcon size={20}/> {t.dbTitle}</h3>
                     <button onClick={() => setShowDbModal(false)} className="text-slate-400 hover:text-red-500 transition-colors"><XIcon size={24}/></button>
                  </div>
                  
                  {/* Tabs */}
                  <div className="flex bg-slate-950 border-b border-slate-800 shrink-0">
                     <button onClick={()=>setActiveTab('players')} className={`flex-1 py-3 font-bold text-sm uppercase tracking-wider transition-colors ${activeTab === 'players' ? 'text-cyan-400 border-b-2 border-cyan-400 bg-cyan-900/10' : 'text-slate-400 hover:bg-slate-900'}`}>{t.tabPlayers}</button>
                     <button onClick={()=>setActiveTab('cars')} className={`flex-1 py-3 font-bold text-sm uppercase tracking-wider transition-colors ${activeTab === 'cars' ? 'text-cyan-400 border-b-2 border-cyan-400 bg-cyan-900/10' : 'text-slate-400 hover:bg-slate-900'}`}>{t.tabCars}</button>
                     <button onClick={()=>setActiveTab('pets')} className={`flex-1 py-3 font-bold text-sm uppercase tracking-wider transition-colors ${activeTab === 'pets' ? 'text-cyan-400 border-b-2 border-cyan-400 bg-cyan-900/10' : 'text-slate-400 hover:bg-slate-900'}`}>{t.tabPets}</button>
                  </div>

                  <div className="p-4 md:p-6 flex-1 overflow-y-auto hide-scrollbar bg-[#0f172a]">
                     
                     {/* TAB: PLAYERS */}
                     {activeTab === 'players' && (
                        <div className="space-y-4">
                           {players.map((pName, idx) => (
                              <div key={`pimg_${idx}`} className="flex flex-col md:flex-row gap-4 items-center bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                 <div className="w-16 h-16 md:w-20 md:h-20 shrink-0 rounded-full border-2 border-slate-600 bg-slate-900 flex items-center justify-center overflow-hidden">
                                    {playerPhotos[idx] ? <img src={playerPhotos[idx]} className="w-full h-full object-cover" onError={(e)=>{e.target.onerror=null; e.target.src='https://placehold.co/100/transparent/white?text=?';}}/> : <User size={30} className="text-slate-500" />}
                                 </div>
                                 <div className="flex-1 w-full space-y-2">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{pName}</label>
                                    <input 
                                       type="text" 
                                       value={playerPhotos[idx] || ''} 
                                       onChange={(e) => {
                                          const newArr = [...playerPhotos];
                                          newArr[idx] = e.target.value;
                                          setPlayerPhotos(newArr);
                                       }}
                                       placeholder="https://..."
                                       className="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm text-cyan-300 outline-none focus:border-cyan-400"
                                    />
                                 </div>
                              </div>
                           ))}
                        </div>
                     )}

                     {/* TAB: CARS & PETS */}
                     {(activeTab === 'cars' || activeTab === 'pets') && (
                        <div className="flex flex-col h-full">
                           <div className="bg-slate-800/80 p-4 rounded-xl border border-slate-700 mb-6 shrink-0 flex flex-col md:flex-row gap-3 items-end">
                              <div className="flex-1 w-full space-y-1">
                                 <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{activeTab === 'cars' ? t.carName : t.petName}</label>
                                 <input type="text" value={newItemName} onChange={e=>setNewItemName(e.target.value)} placeholder="Tên..." className="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm text-white outline-none focus:border-cyan-400" />
                              </div>
                              <div className="flex-1 w-full space-y-1">
                                 <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.imgUrl}</label>
                                 <input type="text" value={newItemUrl} onChange={e=>setNewItemUrl(e.target.value)} placeholder="https://..." className="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm text-cyan-300 outline-none focus:border-cyan-400" />
                              </div>
                              <button onClick={handleAddAsset} className="w-full md:w-auto px-6 py-2 h-[38px] bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded shadow-md transition-colors uppercase text-sm">
                                 {t.addBtn}
                              </button>
                           </div>

                           <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                              {(activeTab === 'cars' ? carDatabase : petDatabase).map(item => (
                                 <div key={item.id} className="bg-slate-800/50 border border-slate-700 rounded-xl p-3 flex flex-col items-center gap-3 relative group">
                                    <button onClick={()=>handleDeleteAsset(item.id, activeTab)} className="absolute top-2 right-2 p-1.5 bg-red-600/80 text-white rounded opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 shadow-md">
                                       <Trash2 size={14}/>
                                    </button>
                                    <div className="w-full h-20 bg-black/30 rounded flex items-center justify-center p-2">
                                       <img src={item.img} className="max-w-full max-h-full object-contain" onError={(e)=>{e.target.onerror=null; e.target.src='https://placehold.co/100x50/333/white?text=?';}}/>
                                    </div>
                                    <span className="text-xs font-bold text-center w-full truncate px-1 text-slate-300">{item.name}</span>
                                 </div>
                              ))}
                              {(activeTab === 'cars' ? carDatabase : petDatabase).length === 0 && (
                                 <div className="col-span-full py-10 text-center text-slate-500 italic">{t.emptyDb}</div>
                              )}
                           </div>
                        </div>
                     )}
                  </div>
               </div>
            </div>
         );
      };

      return (
        <div className="min-h-screen relative overflow-x-hidden pb-20">
          
          <CustomDialog dialog={dialog} setDialog={setDialog} />

          {/* TAB Livestream Component */}
          {broadcastState.isOpen && (
            <BroadcastOverlay 
              broadcastState={broadcastState}
              setBroadcastState={setBroadcastState}
              viewSet={viewSet}
              setViewSet={setViewSet}
              soloSetBO={soloSetBO}
              soloMatchBO={soloMatchBO}
              players={players} 
              personalRecords={personalRecords}
              games={games} 
              totals={totals} 
              getGameCalculations={getGameCalculations}
              matchStatus1v1={matchStatus1v1}
              mapRecords={mapRecords}
              lang={lang} 
              t={t} 
              gameMode={gameMode} 
              tournamentName={tournamentName}
              team1Name={displayTeam1Name}
              team2Name={displayTeam2Name}
              carDatabase={carDatabase}
              petDatabase={petDatabase}
              playerPhotos={playerPhotos}
              onAssetSelect={handleAssetSelect}
              onClose={() => setBroadcastState({...broadcastState, isOpen: false})} 
            />
          )}

          {/* RECORDS MODAL */}
          {showRecordsModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-slide-up" onClick={() => setShowRecordsModal(false)}>
              <div className="bg-slate-900 border border-amber-500/50 rounded-xl max-w-3xl w-full shadow-[0_0_50px_rgba(245,158,11,0.2)] overflow-hidden flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                <div className="bg-slate-950 px-4 py-3 md:py-4 border-b border-slate-800 flex justify-between items-center shrink-0 relative overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-transparent"></div>
                  <h3 className="font-black text-amber-400 italic tracking-widest uppercase text-lg flex items-center gap-2 z-10"><Trophy size={20}/> {t.recordTitle}</h3>
                  <button onClick={() => setShowRecordsModal(false)} className="text-slate-400 hover:text-red-500 transition-colors z-10"><XIcon size={24}/></button>
                </div>
                
                <div className="bg-slate-950 p-3 border-b border-slate-800 shrink-0 z-10">
                   <input 
                     type="text"
                     placeholder={t.searchPh}
                     value={recordSearch}
                     onChange={(e) => setRecordSearch(e.target.value)}
                     className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white outline-none focus:border-amber-500 transition-colors"
                   />
                </div>

                <div className="p-4 md:p-6 flex-1 overflow-y-auto hide-scrollbar space-y-6 bg-[#0f172a]">
                  {MAP_POOL.map((group, groupIdx) => {
                     const mapLang = lang === 'th' ? 'en' : lang;
                     const filteredMaps = group.maps.filter(m => m[mapLang].toLowerCase().includes(recordSearch.toLowerCase()));
                     
                     if (filteredMaps.length === 0) return null;

                     return (
                        <div key={`group-${group.stars}`}>
                           <h4 className="text-red-500 font-black text-sm mb-3 flex items-center gap-2">
                              {`★`.repeat(group.stars)} {group.stars} {lang==='vi'?'Sao':lang==='en'?'Stars':'星'}
                              <div className="flex-1 h-px bg-slate-700/50 ml-2"></div>
                           </h4>
                           <div className="grid sm:grid-cols-2 gap-3">
                              {filteredMaps.map(map => {
                                 const record = mapRecords[map.id];
                                 return (
                                    <div key={map.id} className={`group/record relative border rounded-lg p-3 flex items-center justify-between transition-colors ${record ? 'bg-slate-800/50 border-slate-700 hover:bg-slate-800 hover:border-amber-500/30' : 'bg-slate-900/30 border-slate-800/50'}`}>
                                       <div className="flex flex-col overflow-hidden mr-2 flex-1">
                                          <span className={`font-bold text-sm truncate ${record ? 'text-cyan-300' : 'text-slate-500'}`}>{map[mapLang]}</span>
                                          {record ? (
                                             <div className="flex items-center gap-1.5 mt-1">
                                                <span className="text-[10px] bg-slate-900 text-slate-400 px-1.5 py-0.5 rounded truncate max-w-[100px]">{record.player}</span>
                                                <span className="text-[9px] text-slate-500">{record.date}</span>
                                             </div>
                                          ) : (
                                             <div className="mt-1 text-[10px] text-slate-600 italic font-mono">-- No Record --</div>
                                          )}
                                       </div>
                                       <div className="flex items-center gap-2 shrink-0">
                                          {record ? (
                                             <>
                                                <div className="flex flex-col items-end justify-center bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20">
                                                   <span className="text-amber-400 font-black text-lg tracking-wider leading-none">{record.timeStr}</span>
                                                </div>
                                                <button 
                                                   onClick={() => handleDeleteRecord(map.id)} 
                                                   className="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-500/10 rounded transition-colors opacity-0 group-hover/record:opacity-100 absolute right-1 top-1" 
                                                   title="Delete Record"
                                                >
                                                   <Trash2 size={14}/>
                                                </button>
                                             </>
                                          ) : (
                                             <div className="text-slate-700 font-black text-lg tracking-wider leading-none px-2 py-1">--:--.--</div>
                                          )}
                                       </div>
                                    </div>
                                 )
                              })}
                           </div>
                        </div>
                     )
                  })}
                </div>

                <div className="bg-slate-950 p-4 border-t border-slate-800 shrink-0 flex flex-wrap gap-3 justify-between items-center">
                   <div className="text-[10px] text-slate-500 md:w-1/2">
                      Dữ liệu được lưu cục bộ trên trình duyệt. Hãy tải file sao lưu để không bị mất kỷ lục khi đổi máy.
                   </div>
                   <div className="flex gap-2 w-full md:w-auto">
                      <button onClick={backupRecords} className="flex-1 md:flex-none flex items-center justify-center gap-1.5 bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white border border-blue-500/30 px-3 py-2 rounded text-xs font-bold transition-colors">
                         {t.backupBtn}
                      </button>
                      <label className="flex-1 md:flex-none flex items-center justify-center gap-1.5 bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600 hover:text-white border border-emerald-500/30 px-3 py-2 rounded text-xs font-bold transition-colors cursor-pointer">
                         {t.restoreBtn}
                         <input type="file" accept=".json" onChange={restoreRecords} className="hidden" />
                      </label>
                   </div>
                </div>
              </div>
            </div>
          )}

          {/* DYNAMIC DATABASE MODAL */}
          {showDbModal && <DatabaseManagerModal />}

          {/* INFO MODAL */}
          {showInfo && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-slide-up" onClick={() => setShowInfo(false)}>
              <div className="bg-slate-900 border border-slate-700 rounded-xl max-w-md w-full shadow-[0_0_40px_rgba(220,38,38,0.2)] overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="bg-slate-950 px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                  <h3 className="font-black text-amber-400 italic tracking-widest uppercase">{t.infoTitle}</h3>

                        </div>

                        <div className="flex items-center justify-end gap-4 flex-1 h-full pr-4 md:pr-8">
                            <span className="text-2xl md:text-4xl text-white font-black drop-shadow-md min-w-[30px] text-center">{matchStatus1v1.p2Rounds}</span>
                            <div className="w-px h-8 bg-white/40 shadow-[1px_0_0_rgba(0,0,0,0.2)]"></div>
                            <span className="text-lg md:text-2xl tracking-wider truncate font-black drop-shadow-md text-center flex-1">{players[1]}</span>
                            <div className="w-px h-8 bg-white/40 shadow-[1px_0_0_rgba(0,0,0,0.2)]"></div>
                            <span className="text-3xl md:text-4xl text-[#fce300] font-black drop-shadow-[0_0_10px_rgba(252,227,0,0.6)]">{matchStatus1v1.p2Sets}</span>
                        </div>
                    </div>
                  ) : (
                    <table className="w-full text-xs md:text-sm border-collapse">
                      <tbody>
                        <tr className={`border-t-4 border-red-600 ${isTeamMode ? 'border-b border-slate-700/50' : ''}`}>
                          <td className={`px-2 md:px-4 py-2 md:py-3 text-right font-black uppercase tracking-widest w-[128px] md:w-[240px] ${isTeamMode ? 'text-[10px] md:text-xs text-slate-400' : 'text-xs md:text-sm text-red-500'}`}>
                            {isTeamMode ? t.indivTotal : t.total}
                          </td>
                          <td className="p-0">
                            <div className="flex w-full">
                              {totals.map((total, i) => {
                                if (i >= players.length) return null;
                                return (
                                <div key={i} className={`flex-1 px-1 md:px-2 py-2 md:py-3 text-center border-white/5 ${isTeamMode && i === Math.floor(players.length/2) ? 'border-l-2 border-slate-700/50' : 'border-l'}`}>
                                  <span className={`${isTeamMode ? 'text-sm md:text-lg font-bold text-slate-400 drop-shadow-none' : 'text-lg md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400 drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] cursor-default'}`}>
                                    {total}
                                  </span>
                                </div>
                              )})}
                            </div>
                          </td>
                        </tr>
                        {isTeamMode && (
                          <tr className="border-t border-amber-500/50 shadow-[0_-5px_20px_rgba(245,158,11,0.2)]">
                            <td className="px-2 md:px-4 py-2 md:py-3 text-right font-black text-amber-500 uppercase tracking-widest text-xs md:text-sm w-[128px] md:w-[240px]">
                              {t.teamTotal}
                            </td>
                            <td className="p-0">
                               <div className="flex w-full">
                                  <div className="flex-1 px-1 md:px-2 py-1.5 md:py-2 flex flex-col items-center justify-center border-l-2 border-amber-500/30">
                                     <input
                                       type="text"
                                       value={team1Name}
                                       onChange={(e) => setTeam1Name(e.target.value)}
                                       placeholder={t.team1}
                                       className="w-[90%] max-w-[150px] bg-transparent text-center text-[10px] md:text-xs font-bold text-blue-300 uppercase tracking-widest outline-none border-b border-dashed border-blue-900/50 focus:border-blue-400 transition-colors mb-0.5 md:mb-1 placeholder:text-blue-400/50"
                                     />
                                     <span className="text-xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-b from-blue-200 to-blue-500 drop-shadow-[0_0_20px_rgba(59,130,246,0.6)] cursor-default leading-none">
                                        {totals.filter((_, i) => i < Math.floor(players.length/2)).reduce((a, b) => a + b, 0)}
                                     </span>
                                  </div>
                                  <div className="flex-1 px-1 md:px-2 py-1.5 md:py-2 flex flex-col items-center justify-center border-l-2 border-amber-500/30">
                                     <input
                                       type="text"
                                       value={team2Name}
                                       onChange={(e) => setTeam2Name(e.target.value)}
                                       placeholder={t.team2}
                                       className="w-[90%] max-w-[150px] bg-transparent text-center text-[10px] md:text-xs font-bold text-red-300 uppercase tracking-widest outline-none border-b border-dashed border-red-900/50 focus:border-red-400 transition-colors mb-0.5 md:mb-1 placeholder:text-red-400/50"
                                     />
                                     <span className="text-xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-b from-red-200 to-red-500 drop-shadow-[0_0_20px_rgba(239,68,68,0.6)] cursor-default leading-none">
                                        {totals.filter((_, i) => i >= Math.floor(players.length/2)).reduce((a, b) => a + b, 0)}
                                     </span>
                                  </div>
                               </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>

              {gameMode !== '1v1' && (
                  <div className="lg:col-span-1 animate-slide-up delay-200 order-first lg:order-last flex flex-col gap-4">
                    <div className="bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.6)]">
                      <div className="bg-slate-950 px-4 md:px-6 py-3 border-b border-slate-800 flex items-center justify-between">
                        <h2 className="font-black text-white tracking-[0.1em] uppercase italic transform skew-x-[-10deg] text-sm md:text-base cursor-default">{t.leaderboard}</h2>
                        <Flame className="text-red-500 animate-pulse w-4 h-4" />
                      </div>
                      
                      <div className="p-2 md:p-3 space-y-2 flex flex-row lg:flex-col overflow-x-auto lg:overflow-x-visible hide-scrollbar">
                        {activeLeaderboard.map((item) => {
                          const isTop1 = item.rank === 1 && item.score > 0;
                          const isTop2 = item.rank === 2 && item.score > 0;
                          const isTop3 = item.rank === 3 && item.score > 0;
                          const isPicker = nextPickerData && nextPickerData.show && ((isTeamMode && nextPickerData.isT1 === item.isT1) || (!isTeamMode && nextPickerData.pIndex === item.oIndex));

                          return (
                            <div key={item.id} className={`relative flex items-center justify-between p-2 rounded border min-w-[140px] lg:min-w-0 flex-shrink-0 cursor-default
                                ${isTop1 ? 'bg-amber-500/10 border-amber-500 shadow-[inset_0_0_15px_rgba(251,191,36,0.15)]' : isTop2 ? 'bg-slate-400/10 border-slate-400' : isTop3 ? 'bg-orange-700/10 border-orange-600' : 'bg-slate-950/50 border-slate-800'}
                              `}>
                              <div className={`absolute left-0 top-0 bottom-0 w-1 rounded-l ${isTop1?'bg-amber-400':isTop2?'bg-slate-300':isTop3?'bg-orange-500':'bg-slate-700'}`}></div>

                              <div className="flex items-center gap-2 pl-2 min-w-0 flex-1">
                                <div className={`flex-shrink-0 w-6 h-6 rounded bg-black/50 border flex items-center justify-center font-black italic text-xs shadow-inner
                                  ${isTop1 ? 'text-amber-400 border-amber-500/50' : isTop2 ? 'text-slate-300 border-slate-400/50' : isTop3 ? 'text-orange-400 border-orange-500/50' : 'text-slate-600 border-slate-700'}
                                `}>#{item.rank}</div>
                                <div className="flex flex-col">
                                  <span className={`font-bold tracking-wider text-xs truncate max-w-[100px] ${isTop1 ? 'text-white' : 'text-slate-300'}`}>{item.name}</span>
                                  {isTeamMode && <span className="text-[9px] text-slate-500 truncate max-w-[100px]">{item.playersStr}</span>}
                                </div>
                              </div>
                              
                              <div className="flex items-baseline gap-1 flex-shrink-0">
                                <span className={`text-lg font-black ${isTop1 ? 'text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,0.8)]' : 'text-white'}`}>{item.score}</span>
                                <span className="text-[9px] text-slate-500 font-bold hidden sm:inline">{t.pts}</span>
                              </div>

                              {/* THÔNG BÁO QUYỀN CHỌN MAP */}
                              {isPicker && (
                                <div className="absolute -top-3 -right-2 bg-purple-600 border border-purple-400 px-2 py-0.5 rounded text-[9px] font-black uppercase text-white shadow-[0_0_10px_#9333ea] animate-pulse whitespace-nowrap z-20 flex items-center gap-1">
                                  🎯 {t.pick}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
              )}

            </div>
          </div>
          
          {/* TOAST NOTIFICATION CHO KỶ LỤC MỚI */}
          {toastMsg && (
            <div className="fixed bottom-4 right-4 z-[9999] bg-gradient-to-r from-amber-500 to-orange-600 text-white px-4 py-3 rounded-lg shadow-[0_5px_20px_rgba(245,158,11,0.4)] flex items-center gap-3 font-bold text-sm animate-slide-up border border-amber-300">
              <Trophy size={20} className="animate-bounce" />
              <span>{toastMsg}</span>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
